<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Asset Check — GIA Learning App</title>
<style>
  :root {
    --bg: #FAF6EF;
    --card: #FFFFFF;
    --text: #2B2722;
    --sub: #706659;
    --hint: #A79A89;
    --border: #DCD2C2;
    --ok: #8AC4A8;
    --warn: #EEC770;
    --bad: #EBA98C;
    --primary: #E09AAE;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .wrap { max-width: 760px; margin: 32px auto; padding: 0 20px; }
  h1 { font-size: 26px; font-weight: 700; margin: 0 0 6px; }
  .sub { color: var(--sub); margin-bottom: 24px; font-size: 14px; }

  .card { background: var(--card); border: 1px solid var(--border);
          border-radius: 16px; padding: 22px 24px;
          box-shadow: 0 2px 10px rgba(120, 90, 60, 0.06);
          margin-bottom: 16px; }
  .card h2 { margin: 0 0 14px; font-size: 18px; font-weight: 700; }

  .stat-row { display: flex; gap: 20px; margin-bottom: 14px; flex-wrap: wrap; }
  .stat { flex: 1; min-width: 100px; text-align: center; padding: 12px;
          background: var(--bg); border-radius: 10px; }
  .stat .n { font-size: 26px; font-weight: 700; }
  .stat .l { font-size: 12px; color: var(--sub); margin-top: 4px;
             text-transform: uppercase; letter-spacing: 0.05em; }
  .stat.ok .n { color: var(--ok); }
  .stat.bad .n { color: var(--bad); }

  .path { font-family: ui-monospace, Menlo, monospace; font-size: 12px;
          color: var(--hint); background: var(--bg); padding: 8px 12px;
          border-radius: 8px; word-break: break-all; margin-bottom: 14px; }

  .missing-list { max-height: 320px; overflow-y: auto;
                  background: var(--bg); border-radius: 10px; padding: 8px; }
  .missing-item { font-family: ui-monospace, Menlo, monospace; font-size: 13px;
                  padding: 6px 10px; color: var(--text); }
  .missing-item:nth-child(odd) { background: rgba(0,0,0,0.02); border-radius: 4px; }

  .all-good { padding: 28px; text-align: center; color: var(--ok); font-weight: 600; }
  .all-good svg { width: 38px; height: 38px; margin-bottom: 8px; }

  .actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .btn { background: var(--primary); color: white; border: none;
         padding: 10px 18px; border-radius: 9999px; font-weight: 600;
         font-size: 13px; cursor: pointer; }
  .btn.secondary { background: transparent; color: var(--text);
                   border: 1px solid var(--border); }
  .btn:hover { filter: brightness(1.08); }

  .help { color: var(--sub); font-size: 13px; line-height: 1.6; }
  .help code { background: var(--bg); padding: 1px 6px; border-radius: 4px;
               font-family: ui-monospace, Menlo, monospace; font-size: 12px; }

  .loading { padding: 40px; text-align: center; color: var(--hint); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Asset Check</h1>
  <p class="sub">Reports files that the app expects but can't find on disk.
     PDFs are intentionally out of git (copyright) — they must be copied manually.</p>

  <div id="content"><div class="loading">Loading…</div></div>
</div>

<script>
async function load() {
  const root = document.getElementById('content');
  try {
    const res = await fetch('/api/system/asset-check');
    const data = await res.json();
    root.innerHTML = renderKangaroo(data.kangaroo_pdf || {});
  } catch (e) {
    root.innerHTML = `<div class="card"><p class="help">Failed to load: ${e}</p></div>`;
  }
}

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({
  '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
}[c])); }

function renderKangaroo(k) {
  const allOk = (k.missing_count || 0) === 0;
  const missingHtml = allOk
    ? `<div class="all-good">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
         <div>All Kangaroo PDFs present.</div>
       </div>`
    : `<div class="missing-list">${
        (k.missing || []).map(f => `<div class="missing-item">${esc(f)}</div>`).join('')
      }</div>`;

  const helpHtml = allOk ? '' : `
    <div class="help" style="margin-top:14px">
      <strong>How to fix:</strong> AirDrop or rsync these PDFs from dad's Mac to
      <code>${esc(k.dir)}</code> on this machine. Git ignores PDFs so they won't be
      removed by future <code>git pull</code>.
    </div>`;

  return `
    <div class="card">
      <h2>Math Kangaroo PDFs</h2>
      <div class="stat-row">
        <div class="stat"><div class="n">${k.expected || 0}</div><div class="l">Expected</div></div>
        <div class="stat ok"><div class="n">${k.present || 0}</div><div class="l">Present</div></div>
        <div class="stat ${k.missing_count ? 'bad' : 'ok'}"><div class="n">${k.missing_count || 0}</div><div class="l">Missing</div></div>
      </div>
      <div class="path">${esc(k.dir || '(unknown)')}</div>
      ${missingHtml}
      ${helpHtml}
      <div class="actions">
        <button class="btn" onclick="load()">Re-check</button>
        <button class="btn secondary" onclick="location.href='/'">Back to App</button>
      </div>
    </div>`;
}

load();
</script>
</body>
</html>
