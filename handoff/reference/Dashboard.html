<style>

</style>

  window.icon = function(name, size, color) {
    size = size || 16; color = color || 'currentColor';
    var paths = window.ICON_PATHS[name] || '';
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+paths+'</svg>';

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
// Minimal Icon shim matching the prototype's <Icon name=... size=... color=...> API
function Icon({ name, size = 16, color = 'currentColor', strokeWidth = 2 }) {
  const paths = window.ICON_PATHS[name] || '';
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
         stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
         dangerouslySetInnerHTML={{ __html: paths }}/>
  );
}
window.Icon = Icon;
</script>
<script type="text/babel" src="Home.jsx"></script>
